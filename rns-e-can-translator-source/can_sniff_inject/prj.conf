CONFIG_CAN=y
CONFIG_CAN_FD_MODE=n
CONFIG_CAN_DEFAULT_BITRATE=100000
CONFIG_CAN_INIT_PRIORITY=80

CONFIG_GPIO=y
CONFIG_CAN_TRANSCEIVER_GPIO=y

CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_PRINTK=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_INIT_PRIORITY=95
CONFIG_SHELL_PROMPT_UART="can> "
CONFIG_SHELL_CMD_BUFF_SIZE=160

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
